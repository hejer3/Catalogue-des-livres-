<!DOCTYPE html>
<html>
<head>
    <meta charset='utf-8'>
    <meta http-equiv='X-UA-Compatible' content='IE=edge'>
    <title>Details du livre</title>
    <meta name='viewport' content='width=device-width, initial-scale=1'>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body >
    <header class="bg-mauve text-white py-4 mb-5 ">
        <div class="container d-flex justify-content-between align-items-center">
             <h1>Details du livre</h1>
             <a href="index.html" class="btn btn-outline-light">Retour</a>
        </div>
    </header>

    <main class="container">
        <div class="row bg-white p-3 rounded">
            <div class="col-md-4 text-center">
                <img id="book-image" alt="picture">
            </div>

            <div class="col-md-8">
                <h1 id="book-title" class="fw-bold" >charging....</h1>
                <p id="book-description" class="text-secondary mt-3">charging....</p>
                <p id="book-rating"></p>
            </div>
        </div>

        <section class="mt-5 p-4 rounded border">
            <h4 class="fw-bold"> Avis des lecteurs</h4> 
            <div id="reviews-list"></div>
        </section>

        <section class="mt-5 p-4 bg-white rounded border">
            <h4 class="mb-4 fw-bold">Laisser un avis</h4>   
            <form id="review-form">
                <div class="row">
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold p-4">Votre Nom :</label>
                        <input type="text" id="user-name" placeholder="nom" >
                    </div>
                    <div class="col-md-8 mb-3">
                        <label class="form-label fw-bold p-4">Note / 5 :</label>
                        <input type="number" id="user-rating" placeholder="note"  >
                    </div>
                </div>
                <div class="mb-3">
                    <label class="form-label fw-bold p-4">Votre Commentaire :</label>
                    <textarea id="user-comment" class="form-control" rows="3" placeholder="Qu'avez-vous pensé de ce livre ?" ></textarea>
                </div>
                <button type="submit" class="btn btn-mauve  fw-bold ">Publier mon avis </button>
            </form>
        </section>

    </main>
    <footer class="text-center border-top">
        <p>Details du livre</p>
    </footer>
    <script src="js/book.js"></script>
</body>
</html>
